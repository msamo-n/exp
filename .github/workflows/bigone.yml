# This is a basic workflow to help you get started with Actions

name: Big One

on:
  workflow_dispatch:
    inputs:

jobs:
  preparation:
    runs-on: ubuntu-latest
    outputs:
      CONFIG_JSON: ${{ steps.generate-config-json.outputs.CONFIG_JSON }}
    steps:
      - name: Run a one-line script
        id: generate-config-json
        run: |
          echo "The Preparation It Is"
          echo "::notice title=Runner Is Selected::Yes it was"
          echo 'CONFIG_JSON={"p1":[{"platform":"P1","tests":{"include":[{"test":"p1-first"},{"test":"p1-second"}]}},{"platform":"P1","tests":{"include":[{"test":"p1-third"},{"test":"p1-fourth"}]}}],"p2":[{"platform":"P2","tests":{"include":[{"test":"p2-first"},{"test":"p2-second"}]}}]}' >>$GITHUB_OUTPUT
      - name: Log It
        run: |
          echo -e "CONFIG_JSON:\n${{ steps.generate-config-json.outputs.CONFIG_JSON }}"

  p-1:
    name: Platform 1
    needs: preparation
    uses: ./.github/workflows/_sequential_runs.yml
    if: ${{ fromJSON(needs.preparation.outputs.CONFIG_JSON).p1 }}
    with:
      CONFIG_JSON: ${{ toJSON(fromJSON(needs.preparation.outputs.CONFIG_JSON).p1) }}

  p-2:
    name: Platform 2
    needs: preparation
    uses: ./.github/workflows/_sequential_runs.yml
    if: ${{ fromJSON(needs.preparation.outputs.CONFIG_JSON).p2 }}
    with:
      CONFIG_JSON: ${{ toJSON(fromJSON(needs.preparation.outputs.CONFIG_JSON).p2) }}
  
  finalize:
    runs-on: ubuntu-latest
    needs: [p-1, p-2]
    if: always()
    steps:
      - name: Finalize
        run: |
          echo "Finalizing"
          echo "::notice title=Finalized::Yes it was"