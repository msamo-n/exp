# This is a basic workflow to help you get started with Actions

name: Big One

on:
  workflow_dispatch:
    inputs:

jobs:
  preparation:
    runs-on: ubuntu-latest
    outputs:
      CONFIG_JSON_P1: ${{ steps.generate-config-json.outputs.CONFIG_JSON_P1 }}
      CONFIG_JSON_P2: ${{ steps.generate-config-json.outputs.CONFIG_JSON_P2 }}
    steps:
      - name: Run a one-line script
        id: generate-config-json
        run: |
          echo "The Preparation It Is"
          echo "::notice title=Runner Is Selected::Yes it was"
          echo 'CONFIG_JSON_P1=[{"platform":"P1","tests":{"include":[{"test":"p1-first"},{"test":"p1-second"}]}},{"platform":"P1","tests":{"include":[{"test":"p1-third"},{"test":"p1-fourth"}]}}]' >>$GITHUB_OUTPUT
          echo 'CONFIG_JSON_P2=[{"platform":"P2","tests":{"include":[{"test":"p2-first"},{"test":"p2-second"}]}}]' >>$GITHUB_OUTPUT
      - name: Log It
        run: |
          echo -e "CONFIG_JSON_P1:\n${{ steps.generate-config-json.outputs.CONFIG_JSON_P1 }}\n"
          echo -e "CONFIG_JSON_P2:\n${{ steps.generate-config-json.outputs.CONFIG_JSON_P2 }}\n"

  p-1:
    name: Platform 1
    needs: preparation
    uses: ./.github/workflows/_sequential_runs.yml
    if: ${{ needs.preparation.outputs.CONFIG_JSON_P1 != '' }}
    with:
      CONFIG_JSON: ${{ needs.preparation.outputs.CONFIG_JSON_P1 }}

  p-2:
    name: Platform 2
    needs: preparation
    uses: ./.github/workflows/_sequential_runs.yml
    if: ${{ needs.preparation.outputs.CONFIG_JSON_P2 != '' }}
    with:
      CONFIG_JSON: ${{ needs.preparation.outputs.CONFIG_JSON_P2 }}